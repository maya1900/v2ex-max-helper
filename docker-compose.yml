services:
  v2ex-bot:
    image: ghcr.io/mskatoni/v2ex-max-helper:latest
    container_name: v2ex-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - v2ex-data:/data
    environment:
      - TZ=UTC

    # ===== 安全加固 =====
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN    # Chromium 沙盒需要
    read_only: true
    tmpfs:
      - /tmp:size=512m
      - /home/v2ex:size=200m

    # 内存限制（防止 Chromium 吃光宿主机）
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

volumes:
  v2ex-data:
